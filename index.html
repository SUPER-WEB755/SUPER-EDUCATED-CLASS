<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admit Card Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* FORM */
.container{
width:95%;
max-width:420px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{text-align:center;margin-bottom:20px;}

select,input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:95%;
max-width:800px;
padding:25px;
position:relative;
border:3px solid #000;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
color:red;
}

/* LOGO */
.logo-left{
position:absolute;
top:20px;
left:20px;
width:80px;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.07;
width:300px;
}

.content{
position:relative;
z-index:2;
}

.header2{
text-align:center;
padding-left:90px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table,th,td{
border:1px solid black;
padding:6px;
text-align:center;
}

/* MOBILE */
@media(max-width:600px){
.card{padding:15px;}
.logo-left{width:60px;}
.header2{padding-left:70px;}
table{display:block;overflow-x:auto;}
}
</style>

</head>
<body>

<div class="container">
<div class="header">
<h2>SUPER EDUCATED CLASS</h2>
<p>Admit Card Portal</p>
</div>

<select id="year">
<option value="2026">2026</option>
</select>

<select id="class">
<option value="">All Class</option>
<option value="UKG">Class UKG</option>
<option value="4">Class 4</option>
<option value="6">Class 6</option>
<option value="7">Class 7</option>
</select>

<select id="term">
<option value="third">Third Term</option>
</select>

<input type="text" id="name" placeholder="Enter Student Name">

<button onclick="showAdmit()">🔍 SEARCH</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="card">

<span class="close" onclick="closePopup()">✖</span>

<img src="https://i.postimg.cc/hPpH9mRt/logo.png" class="logo-left">
<img src="https://i.postimg.cc/hPpH9mRt/logo.png" class="watermark">

<div id="admitContent" class="content"></div>

</div>
</div>

<script>

{sub:"G.K",code:"1022",date:"21-03-2026",day:"SATURDAY"}
]
}
}

}
}
};

/* SEARCH FUNCTION (AUTO SEARCH ALL CLASS) */
function showAdmit(){

let y=document.getElementById("year").value;
let t=document.getElementById("term").value;
let selectedClass=document.getElementById("class").value;
let name=document.getElementById("name").value.toUpperCase().trim();

let student=null;
let roll=null;
let foundClass=null;

let termData=admitData[y]?.[t];

if(!termData){
alert("No Data Found");
return;
}

/* LOOP ALL CLASS */
for(let cls in termData){

if(selectedClass && cls!==selectedClass) continue;

let classData=termData[cls];

for(let r in classData){
if(classData[r].n.toUpperCase().trim()===name){
student=classData[r];
roll=r;
foundClass=cls;
break;
}
}

if(student) break;
}

if(!student){
alert("❌ Student Not Found");
return;
}

/* SUBJECT TABLE */
let rows="";
student.subjects.forEach(s=>{
rows+=`<tr>
<td>${s.sub}</td>
<td>${s.code}</td>
<td>${s.date}</td>
<td>${s.day}</td>
</tr>`;
});

/* OUTPUT */
document.getElementById("admitContent").innerHTML=`
<div class="header2">
<h2>SUPER EDUCATED CLASS</h2>
<p>SHEKHPUR DAUD AZAMGARH</p>
<h3>${t.toUpperCase()} TERM EXAMINATION ${y}</h3>
</div>

<hr>

<table>
<tr>
<td><b>NAME:</b> ${student.n}</td>
<td><b>CLASS:</b> ${foundClass}</td>
<td><b>ROLL NO:</b> ${roll}</td>
</tr>

<tr>
<td><b>FATHER NAME:</b> ${student.f}</td>
<td colspan="2"><b>ADMIT CARD ID:</b> ${student.a}</td>
</tr>
</table>

<table>
<tr>
<th>SUBJECT</th>
<th>PAPER CODE</th>
<th>DATE</th>
<th>DAY</th>
</tr>
${rows}
</table>

<br>
<p style="text-align:right">Teacher Signature</p>
`;

document.getElementById("popup").style.display="flex";
}

/* CLOSE */
function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
